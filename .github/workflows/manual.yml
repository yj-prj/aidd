name: AI Trend Bot - 수동 실행

on:
  workflow_dispatch:
    inputs:
      period:
        description: "브리핑 시간대"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install requests feedparser

      - name: 📚 seen.json 캐시 복원 (중복 제거 이력)
        uses: actions/cache/restore@v4
        with:
          path: seen.json
          key: ai-trend-seen-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ai-trend-seen-

      - name: 🤖 봇 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          RUN_PERIOD: ${{ inputs.period }}
        run: python main.py

      - name: 💾 seen.json 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen.json
          key: ai-trend-seen-${{ github.run_id }}-${{ github.run_attempt }}
