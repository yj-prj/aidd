name: AI Trend Bot - 수동 실행

on:
  workflow_dispatch:
    inputs:
      period:
        description: "브리핑 시간대"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install requests

      - name: 🤖 봇 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          RUN_PERIOD: ${{ inputs.period }}
        run: python main.py
